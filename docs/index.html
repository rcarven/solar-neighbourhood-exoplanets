<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exoplanetas en la Vecindad Solar y Visibilidad ELT-PCS</title>
    <style>
        /* Estilos generales para que quede limpio y profesional */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
        }
        .header {
            background-color: #1a252c; /* Azul oscuro astronómico */
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 { margin: 0 0 10px 0; }
        .header p { margin: 0; font-size: 1.1em; opacity: 0.9; }
        
        /* Estilos de las pestañas */
        .tab-container {
            max-width: 1200px;
            margin: 20px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .tabs {
            display: flex;
            background-color: #e2e8f0;
        }
        .tab-button {
            flex: 1;
            background-color: inherit;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #4a5568;
            transition: 0.3s;
        }
        .tab-button:hover { background-color: #cbd5e0; }
        .tab-button.active {
            background-color: white;
            color: #2b6cb0;
            border-bottom: 3px solid #2b6cb0;
        }
        
        /* Contenido de las pestañas (los iframes) */
        .tab-content {
            display: none; /* Oculto por defecto */
            padding: 20px;
        }
        .tab-content.active {
            display: block; /* Solo se muestra el activo */
        }
        iframe {
            width: 100%;
            height: 750px; /* Altura generosa para ver bien gráficos y tablas */
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Exoplanetas en la Vecindad Solar</h1>
        <p>Catálogo interactivo y simulaciones de observación instrumental</p>
    </div>

    <div class="tab-container">
        <div class="tabs">
            <button class="tab-button active" onclick="abrirPestana(event, 'Catalogo')">1. Catálogo de Exoplanetas</button>
            <button class="tab-button" onclick="abrirPestana(event, 'ELT')">2. Visibilidad ELT-PCS</button>
        </div>

        <div id="Catalogo" class="tab-content active">
            <p><em>Tabla interactiva con los parámetros de la muestra seleccionada.</em></p>
            <iframe src="exoplanets_catalogue.html"></iframe>
        </div>

        <div id="ELT" class="tab-content">
            <p><em>Simulación de visibilidad adaptada del código GRIP para el instrumento ELT-PCS.</em></p>
            <iframe src="exoplanets_visualization.html"></iframe>
        </div>
    </div>

    <script>
        function abrirPestana(evt, nombrePestana) {
            var i, tabcontent, tablinks;
            
            // Oculta todo el contenido
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].classList.remove("active");
            }
            
            // Quita la clase "active" de todos los botones
            tablinks = document.getElementsByClassName("tab-button");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            
            // Muestra el contenido actual y añade la clase "active" al botón que se ha pulsado
            document.getElementById(nombrePestana).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>

</body>
</html>
